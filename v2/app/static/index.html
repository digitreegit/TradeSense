<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TradeSense v2</title>
<style>
  :root {
    --bg: #0d1117; --panel: #161b22; --border: #21262d;
    --text: #e6edf3; --dim: #8b949e;
    --green: #3fb950; --red: #f85149; --amber: #d29922; --blue: #58a6ff;
  }
  * { box-sizing: border-box; margin: 0; }
  body { background: var(--bg); color: var(--text); font: 14px/1.5 -apple-system, 'SF Pro', Segoe UI, sans-serif; padding: 24px; }
  h1 { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
  .sub { color: var(--dim); font-size: 12px; margin-bottom: 20px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 20px; }
  .card { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; }
  .card .label { color: var(--dim); font-size: 11px; text-transform: uppercase; letter-spacing: .05em; }
  .card .value { font-size: 22px; font-weight: 700; margin-top: 2px; font-variant-numeric: tabular-nums; }
  .green { color: var(--green); } .red { color: var(--red); } .amber { color: var(--amber); } .blue { color: var(--blue); }
  .panel { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 16px; margin-bottom: 16px; }
  .panel h2 { font-size: 13px; color: var(--dim); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 10px; }
  table { width: 100%; border-collapse: collapse; font-variant-numeric: tabular-nums; }
  th { text-align: left; color: var(--dim); font-size: 11px; font-weight: 500; padding: 4px 8px; border-bottom: 1px solid var(--border); }
  td { padding: 6px 8px; border-bottom: 1px solid var(--border); font-size: 13px; }
  tr:last-child td { border-bottom: none; }
  .pill { display: inline-block; padding: 1px 8px; border-radius: 999px; font-size: 11px; font-weight: 600; }
  .pill.momentum { background: #1f3a5f; color: var(--blue); }
  .pill.dip { background: #3b2e1a; color: var(--amber); }
  .pill.crypto { background: #2a1f3f; color: #bc8cff; }
  .pill.BULL { background: #12351f; color: var(--green); }
  .pill.CHOP { background: #3b2e1a; color: var(--amber); }
  .pill.BEAR { background: #3d1d1d; color: var(--red); }
  #chart { width: 100%; height: 220px; }
  .empty { color: var(--dim); font-size: 13px; padding: 8px; }
  .err { background: #3d1d1d; color: var(--red); padding: 10px 14px; border-radius: 8px; margin-bottom: 16px; display: none; }
  .briefing { background: linear-gradient(135deg, #161b22 0%, #1a2332 100%); border: 1px solid var(--border); border-radius: 12px; padding: 18px 20px; margin-bottom: 20px; }
  .briefing h2 { font-size: 15px; font-weight: 700; margin-bottom: 14px; color: var(--text); }
  .briefing .headline { font-size: 13px; color: var(--blue); margin-bottom: 14px; font-weight: 600; }
  .briefing-section { margin-bottom: 12px; }
  .briefing-section h3 { font-size: 11px; text-transform: uppercase; letter-spacing: .06em; color: var(--dim); margin-bottom: 6px; }
  .briefing-section ul { list-style: none; padding: 0; }
  .briefing-section li { font-size: 13px; line-height: 1.55; color: var(--text); padding: 2px 0; }
  .briefing-section li::before { content: "· "; color: var(--dim); }
  .pill.defensive { background: #1f3a2f; color: #56d364; }
</style>
</head>
<body>
<h1>TradeSense <span class="blue">v2</span></h1>
<div class="sub" id="subtitle">buy low, sell high — momentum · dip · macro trend <span id="mode"></span></div>
<div class="err" id="err"></div>

<div class="briefing" id="briefing">
  <h2>오늘의 액티비티</h2>
  <div class="headline" id="brief-headline">불러오는 중…</div>
  <div id="brief-sections"></div>
</div>

<div class="grid">
  <div class="card"><div class="label">Equity</div><div class="value" id="equity">—</div></div>
  <div class="card"><div class="label">Cash</div><div class="value" id="cash">—</div></div>
  <div class="card"><div class="label">Regime</div><div class="value" id="regime">—</div></div>
  <div class="card"><div class="label">Drawdown</div><div class="value" id="dd">—</div></div>
  <div class="card"><div class="label">News tilt</div><div class="value" id="tilt">—</div></div>
</div>

<div class="panel"><h2>Equity curve</h2><canvas id="chart"></canvas></div>

<div class="panel"><h2>Positions</h2><div id="positions"></div></div>
<div class="panel"><h2>Queued for next open</h2><div id="pending"></div></div>
<div class="panel"><h2>Recent trades</h2><div id="trades"></div></div>

<script>
const $ = id => document.getElementById(id);
const usd = v => '$' + Number(v).toLocaleString(undefined, {maximumFractionDigits: 0});
const pct = v => (v * 100).toFixed(1) + '%';

function table(rows, cols) {
  if (!rows || !rows.length) return '<div class="empty">비어 있음</div>';
  const head = cols.map(c => `<th>${c.h}</th>`).join('');
  const body = rows.map(r => '<tr>' + cols.map(c => `<td>${c.f(r)}</td>`).join('') + '</tr>').join('');
  return `<table><thead><tr>${head}</tr></thead><tbody>${body}</tbody></table>`;
}
const sleevePill = s => `<span class="pill ${s}">${s}</span>`;
const plClass = v => v >= 0 ? 'green' : 'red';

function drawChart(curve) {
  const c = $('chart'), ctx = c.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const w = c.clientWidth, h = 220;
  c.width = w * dpr; c.height = h * dpr; ctx.scale(dpr, dpr);
  ctx.clearRect(0, 0, w, h);
  if (!curve || curve.length < 2) {
    ctx.fillStyle = '#8b949e'; ctx.fillText('데이터가 쌓이면 표시됩니다', 10, 30); return;
  }
  const vals = curve.map(p => p.equity);
  const min = Math.min(...vals), max = Math.max(...vals), pad = (max - min) * 0.1 || 1;
  const x = i => i / (vals.length - 1) * (w - 20) + 10;
  const y = v => h - 20 - (v - min + pad) / (max - min + 2 * pad) * (h - 40);
  ctx.beginPath();
  vals.forEach((v, i) => i ? ctx.lineTo(x(i), y(v)) : ctx.moveTo(x(i), y(v)));
  ctx.strokeStyle = vals[vals.length-1] >= vals[0] ? '#3fb950' : '#f85149';
  ctx.lineWidth = 2; ctx.stroke();
  ctx.fillStyle = '#8b949e'; ctx.font = '11px sans-serif';
  ctx.fillText(usd(max), 10, 12); ctx.fillText(usd(min), 10, h - 6);
}

function renderBriefing(b) {
  if (!b) return;
  $('brief-headline').textContent = b.headline || '';
  const html = (b.sections || []).map(s =>
    `<div class="briefing-section"><h3>${s.title}</h3><ul>` +
    s.lines.map(l => `<li>${l}</li>`).join('') + '</ul></div>'
  ).join('');
  $('brief-sections').innerHTML = html;
}

async function refresh() {
  try {
    const r = await fetch('/api/snapshot');
    const d = await r.json();
    if (d.error) { $('err').style.display = 'block'; $('err').textContent = d.error; return; }
    $('err').style.display = 'none';
    const sleeves = (d.sleeves || []).join(' · ');
    $('subtitle').innerHTML = sleeves + ' <span id="mode"></span>';
    $('mode').textContent = '· ' + (d.mode || '').toUpperCase();
    renderBriefing(d.briefing);
    $('equity').textContent = usd(d.equity);
    $('cash').textContent = usd(d.cash);
    const reg = d.regime?.regime || '—';
    $('regime').innerHTML = `<span class="pill ${reg}">${reg}</span> <span style="font-size:13px;color:var(--dim)">${pct(d.regime?.exposure ?? 0)} 노출</span>`;
    $('dd').textContent = pct(d.drawdown || 0);
    $('dd').className = 'value ' + (d.halted ? 'red' : (d.drawdown > 0.15 ? 'amber' : ''));
    if (d.halted) $('dd').textContent += ' ⛔';
    $('tilt').textContent = (d.news_overlay?.tilt ?? 1).toFixed(2);
    drawChart(d.equity_curve);
    $('positions').innerHTML = table(d.positions, [
      {h: 'Symbol', f: r => `<b>${r.symbol}</b>`},
      {h: 'Sleeve', f: r => sleevePill(r.sleeve)},
      {h: 'Value', f: r => usd(r.market_value)},
      {h: 'Entry', f: r => Number(r.avg_entry).toFixed(2)},
      {h: 'Now', f: r => Number(r.current_price).toFixed(2)},
      {h: 'Stop', f: r => r.stop_level ? Number(r.stop_level).toFixed(2) : '—'},
      {h: 'P/L', f: r => `<span class="${plClass(r.unrealized_pl)}">${r.unrealized_pl >= 0 ? '+' : ''}${Number(r.unrealized_pl).toFixed(2)}</span>`},
    ]);
    $('pending').innerHTML = table(d.pending, [
      {h: 'Side', f: r => `<span class="${r.side === 'buy' ? 'green' : 'red'}">${r.side.toUpperCase()}</span>`},
      {h: 'Symbol', f: r => `<b>${r.symbol}</b>`},
      {h: 'Sleeve', f: r => sleevePill(r.sleeve)},
      {h: 'Reason', f: r => r.reason || '—'},
    ]);
    $('trades').innerHTML = table(d.trades, [
      {h: 'Time', f: r => new Date(r.ts).toLocaleString()},
      {h: 'Side', f: r => `<span class="${r.side === 'buy' ? 'green' : 'red'}">${r.side.toUpperCase()}</span>`},
      {h: 'Symbol', f: r => `<b>${r.symbol}</b>`},
      {h: 'Sleeve', f: r => sleevePill(r.sleeve || '?')},
      {h: 'Notional', f: r => usd(r.notional)},
      {h: 'Reason', f: r => r.reason || ''},
      {h: 'Detail', f: r => r.detail || ''},
    ]);
  } catch (e) {
    $('err').style.display = 'block';
    $('err').textContent = '서버에 연결할 수 없습니다: ' + e;
  }
}
refresh();
setInterval(refresh, 30000);
</script>
</body>
</html>
