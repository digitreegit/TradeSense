<!DOCTYPE html>
<html lang="en">
  <head>
    <script>
      (function () {
        try {
          var m = localStorage.getItem('tradesense-color-mode');
          if (m !== 'light' && m !== 'dark') {
            m = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
          }
          document.documentElement.dataset.colorMode = m;
          document.documentElement.style.colorScheme = m === 'light' ? 'light' : 'dark';
        } catch (e) {}
      })();
    </script>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="TradeSense - AI-Powered Quant Trading Platform with real-time market analysis and automated trading" />
    <title>TradeSense | AI Quant Trading</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
